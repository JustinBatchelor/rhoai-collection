---
- name: Validate required survey variables
  ansible.builtin.assert:
    that:
      - username | length > 0
      - git_repo | length > 0
      - ai_model | length > 0
      - ai_model in model_catalog
      - editor_type in ['workbench', 'devspace']
    fail_msg: >-
      Missing or invalid survey input.
      username={{ username }}, git_repo={{ git_repo }}, ai_model={{ ai_model }},
      editor_type={{ editor_type }}.
      Supported models: {{ model_catalog.keys() | list }}.
      Supported editors: [workbench, devspace].

- name: Set workspace namespace
  ansible.builtin.set_fact:
    workspace_namespace: "{{ username }}-ai-ws"

- name: Display provisioning summary
  ansible.builtin.debug:
    msg: >-
      Provisioning AI workspace for user '{{ username }}'
      in namespace '{{ workspace_namespace }}'
      with model '{{ model_catalog[ai_model] }}' ({{ ai_model }})
      using editor '{{ editor_type }}'
      and git repo '{{ git_repo }}'.

- name: Create workspace namespace
  kubernetes.core.k8s:
    host: "{{ k8s_host | default(omit, true) }}"
    api_key: "{{ k8s_api_key | default(omit, true) }}"
    validate_certs: "{{ k8s_validate_certs }}"
    api_version: v1
    kind: Namespace
    name: "{{ workspace_namespace }}"
    state: present
    definition:
      metadata:
        labels:
          argocd.argoproj.io/managed-by: "{{ argocd_namespace }}"
          app.kubernetes.io/part-of: "{{ 'che.eclipse.org' if editor_type == 'devspace' else 'ai-workspace' }}"

- name: Create ArgoCD Application CR
  kubernetes.core.k8s:
    host: "{{ k8s_host | default(omit, true) }}"
    api_key: "{{ k8s_api_key | default(omit, true) }}"
    validate_certs: "{{ k8s_validate_certs }}"
    state: present
    definition: "{{ lookup('template', 'argo-application.yaml.j2') | from_yaml }}"

- name: Wait for ArgoCD Application to sync and become healthy
  kubernetes.core.k8s_info:
    host: "{{ k8s_host | default(omit, true) }}"
    api_key: "{{ k8s_api_key | default(omit, true) }}"
    validate_certs: "{{ k8s_validate_certs }}"
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "ai-ws-{{ username }}"
    namespace: "{{ argocd_namespace }}"
  register: app_status
  until:
    - app_status.resources | length > 0
    - app_status.resources[0].status.sync.status | default('') == 'Synced'
    - app_status.resources[0].status.health.status | default('') == 'Healthy'
  retries: "{{ (sync_timeout | int / 30) | int }}"
  delay: 30

# ---- Workbench readiness check ----
- name: Wait for Notebook CR to become ready
  kubernetes.core.k8s_info:
    host: "{{ k8s_host | default(omit, true) }}"
    api_key: "{{ k8s_api_key | default(omit, true) }}"
    validate_certs: "{{ k8s_validate_certs }}"
    api_version: kubeflow.org/v1
    kind: Notebook
    name: "codeserver-nb-{{ username }}"
    namespace: "{{ workspace_namespace }}"
  register: nb_status
  until:
    - nb_status.resources | length > 0
    - nb_status.resources[0].status.readyReplicas | default(0) | int >= 1
  retries: 30
  delay: 10
  when: editor_type == "workbench"

- name: Look up notebook Route in workspace namespace
  kubernetes.core.k8s_info:
    host: "{{ k8s_host | default(omit, true) }}"
    api_key: "{{ k8s_api_key | default(omit, true) }}"
    validate_certs: "{{ k8s_validate_certs }}"
    api_version: route.openshift.io/v1
    kind: Route
    name: "codeserver-nb-{{ username }}"
    namespace: "{{ workspace_namespace }}"
  register: nb_route
  when: editor_type == "workbench"

- name: Get cluster ingress domain
  kubernetes.core.k8s_info:
    host: "{{ k8s_host | default(omit, true) }}"
    api_key: "{{ k8s_api_key | default(omit, true) }}"
    validate_certs: "{{ k8s_validate_certs }}"
    api_version: config.openshift.io/v1
    kind: Ingress
    name: cluster
  register: ingress_config
  when:
    - editor_type == "workbench"
    - nb_route.resources | length == 0

# ---- DevWorkspace URL retrieval ----
- name: Wait for DevWorkspace to become ready
  kubernetes.core.k8s_info:
    host: "{{ k8s_host | default(omit, true) }}"
    api_key: "{{ k8s_api_key | default(omit, true) }}"
    validate_certs: "{{ k8s_validate_certs }}"
    api_version: workspace.devfile.io/v1alpha2
    kind: DevWorkspace
    name: "devspace-{{ username }}"
    namespace: "{{ workspace_namespace }}"
  register: dw_status
  until:
    - dw_status.resources | length > 0
    - dw_status.resources[0].status.mainUrl | default('') | length > 0
  retries: 60
  delay: 10
  when: editor_type == "devspace"

- name: Set IDE URL fact (workbench - notebook route)
  ansible.builtin.set_fact:
    ide_url: "https://{{ nb_route.resources[0].spec.host }}"
  when:
    - editor_type == "workbench"
    - nb_route.resources | length > 0

- name: Set IDE URL fact (workbench - derived from cluster ingress)
  ansible.builtin.set_fact:
    ide_url: >-
      https://{{ rhoai_gateway_route_name }}.{{
      ingress_config.resources[0].spec.domain
      }}/notebook/{{ workspace_namespace }}/codeserver-nb-{{ username }}
  when:
    - editor_type == "workbench"
    - nb_route.resources | length == 0
    - ingress_config.resources | default([]) | length > 0

- name: Set IDE URL fact (devspace)
  ansible.builtin.set_fact:
    ide_url: "{{ dw_status.resources[0].status.mainUrl }}"
  when: editor_type == "devspace"

- name: Display workspace access information
  ansible.builtin.debug:
    msg: |
      ============================================================
      AI Workspace provisioned successfully!
      ============================================================
      User:       {{ username }}
      Namespace:  {{ workspace_namespace }}
      Model:      {{ model_catalog[ai_model] }}
      Editor:     {{ editor_type }}
      IDE URL:    {{ ide_url }}
      ============================================================

      NOTE: The AI model may take 5-10 minutes to download on
      first start. The Continue.dev extension will connect
      automatically once the model is ready.
