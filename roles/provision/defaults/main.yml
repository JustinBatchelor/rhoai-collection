---
# ---- Kubernetes authentication (injected via AAP custom credential) ----
k8s_host: ""
k8s_api_key: ""
k8s_validate_certs: true

# ---- Survey variables (expected from AAP Job Template) ----
username: ""
git_repo: ""
ai_model: "qwen3-coder-30b-a3b"
# Editor type: "workbench" (RHOAI Kubeflow Notebook) or "devspace" (Red Hat Dev Spaces)
editor_type: "workbench"

# ---- Derived / overridable defaults ----
workspace_namespace: "{{ username }}-ai-ws"
devspaces_namespace: "{{ username }}-devspaces"
argocd_namespace: "tenant-gitops"
argocd_project: "team-jbatchel"

# ---- RHOAI gateway (used to construct workbench URLs) ----
# Hostname prefix for the RHOAI gateway; combined with the cluster ingress
# domain (from ingresses.config.openshift.io/cluster) to build the full URL.
rhoai_gateway_route_name: "data-science-gateway"

# Git reference for the Helm chart source
chart_repo_url: "https://github.com/JustinBatchelor/ai-workspace.git"
chart_repo_path: "./"
chart_target_revision: "main"

# Model catalog maps model key -> display name (for logging only;
# the Helm values.yaml carries the full catalog)
model_catalog:
  qwen3-coder-30b-a3b: "Qwen 3 Coder 30B-A3B (AWQ)"
  qwen25-coder-14b: "Qwen 2.5 Coder 14B (AWQ)"
  qwen25-coder-7b: "Qwen 2.5 Coder 7B"
  qwen3-4b: "Qwen 3 4B"

# Feature toggles for incremental deployment
enable_model_serving: true
enable_editor: true

# Timeout for ArgoCD sync wait (seconds).
# GPU node autoscaling + model download can take 15-20 minutes on cold starts.
sync_timeout: 1800
