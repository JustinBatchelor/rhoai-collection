- name: Delete workspace project
  kubernetes.core.k8s:
    host: "{{ k8s_host | default(omit, true) }}"
    api_key: "{{ k8s_api_key | default(omit, true) }}"
    validate_certs: "{{ k8s_validate_certs }}"
    api_version: project.openshift.io/v1
    kind: Project
    name: "{{ workspace_namespace }}"
    state: absent
    wait: true
    wait_timeout: 120

- name: Confirm teardown complete
  ansible.builtin.debug:
    msg: >-
      AI workspace for user '{{ username }}' has been
      successfully torn down. Project '{{ workspace_namespace }}'
      and all associated resources have been removed.
