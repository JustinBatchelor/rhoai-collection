---
# ---- Kubernetes authentication (injected via AAP custom credential) ----
k8s_host: ""
k8s_api_key: ""
k8s_validate_certs: true

# ---- Survey variables (expected from AAP Job Template) ----
username: ""

# ---- Derived / overridable defaults ----
workspace_namespace: "{{ username }}-ai-ws"
argocd_namespace: "tenant-gitops"

# Timeout for ArgoCD Application deletion (seconds)
teardown_timeout: 300
